<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day 🌸</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#2b2b2b,#555,#999);
color:white;
text-align:center;
overflow:hidden;
}

.container{
max-width:500px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(6px);
animation:fadeIn 2s ease;
}

h1{
font-size:40px;
margin-bottom:20px;
text-shadow:0 0 15px #fff;
animation:glow 2s infinite alternate;
}

p{
font-size:20px;
line-height:1.7;
margin:10px 0;
}

.heart{
position:absolute;
color:#ff4f81;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.8);}
to{opacity:1; transform:scale(1);}
}

@keyframes glow{
from{text-shadow:0 0 10px #fff;}
to{text-shadow:0 0 25px #ff9ecf;}
}

@keyframes float{
0%{transform:translateY(100vh); opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<div class="container">

<h1>🌸 Happy Women's Day 🌸</h1>

<p>
I almost let the day end without saying this…
<br><br>
<strong>Happy Women’s Day to the most special woman in my life ❤️</strong>
</p>

<p>
Thank you for being strong, kind, and amazing in your own way.
<br>
I’m really lucky to have you. 🌹
</p>

</div>

<script>
function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";
heart.style.animationDuration=(Math.random()*3+4)+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},7000);
}

setInterval(createHeart,500);
</script>

</body>
</html>
